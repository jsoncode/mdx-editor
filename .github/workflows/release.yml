name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      with_ffmpeg:
        description: Bundle FFmpeg in installers (larger download)
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Install dependencies
        run: npm ci

      - name: Build all package variants
        run: npm run pack:ci
        env:
          CI: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MDX Editor ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Windows 发布包（${{ github.ref_name }}）：

            **standard/** — 默认安装包（不含 FFmpeg）
            - `mdx-editor-portable.exe` — 绿色便携版
            - `*-setup.exe` — NSIS 安装程序
            - `*.msi` — MSI 安装包

            **with-ffmpeg/** — 内置 FFmpeg 版本（体积更大，开箱可转码）
            - 同上三种格式

            若系统 PATH 中已有 FFmpeg，推荐使用 standard 版本。
          files: |
            release-artifacts/**/*
