name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MDX Editor ${{ github.ref_name }}
          releaseBody: |
            ## MDX Editor ${{ github.ref_name }}

            - English product name: **MDX Editor**
            - NSIS installer auto-detects system language (English, Simplified/Traditional Chinese, French, German, Spanish, Japanese, Korean)

            ### Windows

            Download `MDX Editor_*_x64-setup.exe` below and run the installer.
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
